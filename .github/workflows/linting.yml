---
name: Linting
on:  # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches:
      - main

run-name: Pull request - ${{ github.event.pull_request.number }}
jobs:
  shellcheck:
    name: Lint - Shell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ludeeus/action-shellcheck@2.0.0 does not pass SHELLCHECK_OPTS to shellcheck; run explicitly.
      - name: Shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck --version
          mapfile -t files < <(git ls-files 'scripts/*.sh')
          if [[ ${#files[@]} -eq 0 ]]; then echo "No shell scripts under scripts/"; exit 0; fi
          shellcheck -x -e SC1017 "${files[@]}"

  dockerlint:
    name: Lint - Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  markdownlint:
    name: Lint - Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint - Markdown
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          config: ".markdownlint.jsonc"
          globs: "**/*.md"

  yamllint:
    name: Lint - Yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint - Yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
