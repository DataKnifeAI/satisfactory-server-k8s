---
# After verify passes on main, mirror to GitLab; GitLab CI pushes images to internal Harbor.
# GitLab variables: HARBOR_REGISTRY, HARBOR_PROJECT, HARBOR_USER, HARBOR_PASSWORD.
# GitHub secret: GITLAB_TOKEN (write_repository).
name: Mirror to GitLab

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    uses: DataKnifeAI/github-workflows/.github/workflows/reusable-game-server-mirror.yml@main
    secrets: inherit
    with:
      gitlab_mirror_path: dk-raas/dkai/game-servers/satisfactory-server-k8s
      hadolint_failure_threshold: error
      hadolint_dockerfile: Dockerfile
      hadolint_dockerfile_secondary: ""
      kustomize_path: deploy
