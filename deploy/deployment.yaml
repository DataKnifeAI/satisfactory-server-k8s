apiVersion: apps/v1
kind: Deployment
metadata:
  name: satisfactory-server
  labels:
    app.kubernetes.io/name: satisfactory-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: satisfactory-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: satisfactory-server
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: satisfactory
          image: game-server
          imagePullPolicy: Always
          ports:
            - name: game-udp
              containerPort: 7777
              protocol: UDP
            - name: game-tcp
              containerPort: 7777
              protocol: TCP
            - name: beacon
              containerPort: 7778
              protocol: TCP
          envFrom:
            - configMapRef:
                name: satisfactory-server-env
                optional: true
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: server-files
              mountPath: /satisfactory
            - name: save-games
              mountPath: /home/steam/.config/Epic/FactoryGame/Saved/SaveGames
          resources:
            requests:
              cpu: "2"
              memory: 12Gi
            limits:
              cpu: "8"
              memory: 24Gi
      volumes:
        - name: server-files
          persistentVolumeClaim:
            claimName: satisfactory-server-files
        - name: save-games
          persistentVolumeClaim:
            claimName: satisfactory-save-games
