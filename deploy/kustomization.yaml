# Kustomize base: set image tag with `kubectl apply -k deploy/`
# or: kubectl kustomize deploy/ | kubectl apply -f -
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml
images:
  - name: game-server
    # Must match HARBOR_REGISTRY/HARBOR_PROJECT/IMAGE_NAME in .gitlab-ci.yml
    newName: harbor.dataknife.net/library/satisfactory-server-k8s
    # Immutable GitLab CI short SHA in Harbor (bump after each release build).
    newTag: dfcb54c5
