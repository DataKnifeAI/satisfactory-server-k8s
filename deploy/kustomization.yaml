# Kustomize base: set image tag with `kubectl apply -k deploy/`
# or: kubectl kustomize deploy/ | kubectl apply -f -
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml
images:
  - name: game-server
    newName: registry.gitlab.com/dk-raas/dkai/game-servers/satisfactory-server-k8s
    newTag: latest
