apiVersion: v1
kind: Service
metadata:
  name: satisfactory-server
  labels:
    app.kubernetes.io/name: satisfactory-server
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: satisfactory-server
  ports:
    - name: game-udp
      port: 7777
      targetPort: game-udp
      protocol: UDP
    - name: game-tcp
      port: 7777
      targetPort: game-tcp
      protocol: TCP
    - name: beacon
      port: 7778
      targetPort: beacon
      protocol: TCP
