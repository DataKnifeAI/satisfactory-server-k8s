# Shared base manifests for Satisfactory server (default sizing).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml
images:
  - name: game-server
    # Must match HARBOR_REGISTRY/HARBOR_PROJECT/IMAGE_NAME in .gitlab-ci.yml
    newName: harbor.dataknife.net/library/satisfactory-server-k8s
    newTag: latest
