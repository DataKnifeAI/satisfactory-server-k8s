# Reference: Gateway API (Envoy Gateway) for Satisfactory L4 ports.
# Prerequisites: GatewayClass `envoy` (or your implementation), kube-vip / LB pool, Target Namespace.
# Replace EXTERNAL_VIP with a free address from your pool (must not collide with TCP 7777 on another Gateway).
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: satisfactory-gateway
  namespace: game-servers
spec:
  gatewayClassName: envoy
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: satisfactory-kubevip
  addresses:
    - type: IPAddress
      value: EXTERNAL_VIP
  listeners:
    - name: game-udp
      protocol: UDP
      port: 7777
      allowedRoutes:
        namespaces:
          from: Same
    - name: game-tcp
      protocol: TCP
      port: 7777
      allowedRoutes:
        namespaces:
          from: Same
    - name: beacon
      protocol: TCP
      port: 7778
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: satisfactory-game-udp
  namespace: game-servers
spec:
  parentRefs:
    - name: satisfactory-gateway
      namespace: game-servers
      sectionName: game-udp
  rules:
    - backendRefs:
        - name: satisfactory-server-envoy
          port: 7777
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: satisfactory-game-tcp
  namespace: game-servers
spec:
  parentRefs:
    - name: satisfactory-gateway
      namespace: game-servers
      sectionName: game-tcp
  rules:
    - backendRefs:
        - name: satisfactory-server-envoy
          port: 7777
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: satisfactory-beacon
  namespace: game-servers
spec:
  parentRefs:
    - name: satisfactory-gateway
      namespace: game-servers
      sectionName: beacon
  rules:
    - backendRefs:
        - name: satisfactory-server-envoy
          port: 7778
